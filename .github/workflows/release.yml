name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../depnuke-${{ matrix.target }}.tar.gz depnuke
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: depnuke-${{ matrix.target }}
          path: depnuke-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.tar.gz"
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_AARCH64_APPLE=$(shasum -a 256 depnuke-aarch64-apple-darwin/depnuke-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64_APPLE=$(shasum -a 256 depnuke-x86_64-apple-darwin/depnuke-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_AARCH64_LINUX=$(shasum -a 256 depnuke-aarch64-unknown-linux-gnu/depnuke-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(shasum -a 256 depnuke-x86_64-unknown-linux-gnu/depnuke-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          sed -e "s/VERSION/$VERSION/" \
              -e "s/SHA256_AARCH64_APPLE_DARWIN/$SHA_AARCH64_APPLE/" \
              -e "s/SHA256_X86_64_APPLE_DARWIN/$SHA_X86_64_APPLE/" \
              -e "s/SHA256_AARCH64_UNKNOWN_LINUX_GNU/$SHA_AARCH64_LINUX/" \
              -e "s/SHA256_X86_64_UNKNOWN_LINUX_GNU/$SHA_X86_64_LINUX/" \
              homebrew/depnuke.rb > /tmp/depnuke.rb

          git clone https://x-access-token:${GH_TOKEN}@github.com/logaretm/homebrew-tap.git /tmp/homebrew-tap
          cp /tmp/depnuke.rb /tmp/homebrew-tap/Formula/depnuke.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/depnuke.rb
          git commit -m "Update depnuke to $VERSION"
          git push
